<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>5 Minute Habits</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>5 Minute Habits 🌱</h1>
<p class="subtitle">Small habits. Big change.</p>

<div class="category">

<button class="catBtn active" data-cat="mind">Mind</button>
<button class="catBtn" data-cat="body">Body</button>
<button class="catBtn" data-cat="growth">Growth</button>

</div>

<label>Choose your 5 minute habit:</label>

<select id="habitSelect"></select>

<h2 id="timer">05:00</h2>

<h3 id="streak">Streak: 0 🔥</h3>

<h3>Progress Calendar 📅</h3>

<div id="calendar" class="calendar"></div>

<button id="startBtn">Start</button>
<button id="resetBtn">Reset</button>

<button id="darkModeToggle">🌙 Dark Mode</button>

<button id="installBtn" style="display:none">
📲 Install App
</button>

</div>

<script src="script.js"></script>

</body>
</html>
