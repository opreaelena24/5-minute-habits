<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5 Minute Habits</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>5 Minute Habits 🌱</h1>
        <p class="subtitle">Small habits. Big change.</p>

        <!-- Anti Scroll Box -->
        <div id="antiScrollBox" class="antiScroll">
            <p>
                You were about to scroll, right? 👀 <br>
                Give yourself 5 minutes first.
            </p>
            <button id="startFocusBtn">🌱 Start 5 Minutes Instead</button>
        </div>

        <button id="almostScrolledBtn">📵 I almost scrolled...</button>
        <p id="distractionCount"></p>

        <!-- Categories -->
        <div class="category">
            <button class="catBtn active" data-cat="mind">Mind</button>
            <button class="catBtn" data-cat="body">Body</button>
            <button class="catBtn" data-cat="growth">Growth</button>
        </div>

        <!-- Habit Select -->
        <label for="habitSelect">Choose your 5 minute habit:</label>
        <select id="habitSelect"></select>

        <!-- Custom Habit -->
        <input type="text" id="customHabit" placeholder="Add your own habit...">
        <button id="addHabitBtn">Add Habit</button>

        <!-- Timer -->
        <h2 id="timer">05:00</h2>

        <!-- Streak -->
        <h3 id="streak">Streak: 0 🔥</h3>

        <!-- Calendar -->
        <h3>Progress Calendar 📅</h3>
        <div id="calendar" class="calendar"></div>

        <!-- Controls -->
        <button id="startBtn">Start</button>
        <button id="resetBtn">Reset</button>

        <!-- Dark Mode -->
        <button id="darkModeToggle" class="darkToggle">🌙 Dark Mode</button>

    </div>

    <script src="script.js"></script>
</body>
</html>
